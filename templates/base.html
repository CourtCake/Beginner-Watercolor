<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beginner Watercolor for Hobbyists</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:      #c8e4e3;
      --teal-dark: #8ecac8;
      --coral:     #f97159;
      --dark:      #595959;
      --mid:       #a3a3a3;
      --white:     #ffffff;
      --bg:        #f8fbfb;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.9rem;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      margin: 0;
    }

    .navbar {
      background: var(--white) !important;
      border-bottom: 3px solid var(--teal);
      padding: 0.75rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-brand {
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--dark) !important;
    }
    .nav-link {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid) !important;
      padding: 0.4rem 1rem !important;
      border-radius: 20px;
      transition: color 0.2s, background 0.2s;
    }
    .nav-link:hover {
      color: var(--dark) !important;
      background: var(--teal);
    }

    .btn-wc {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: var(--dark);
      color: var(--white);
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.6rem;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
    }
    .btn-wc:hover {
      background: var(--coral);
      color: var(--white);
      transform: translateY(-1px);
    }
    .btn-wc-outline {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: transparent;
      color: var(--dark);
      border: 2px solid var(--dark);
      border-radius: 6px;
      padding: 0.55rem 1.5rem;
      transition: background 0.2s, color 0.2s, transform 0.15s;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
    }
    .btn-wc-outline:hover {
      background: var(--dark);
      color: var(--white);
      transform: translateY(-1px);
    }

    .wc-card {
      background: var(--white);
      border-radius: 14px;
      border: 1.5px solid #e0efee;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04);
    }

    .box-teal {
      background: var(--teal);
      border-left: 4px solid var(--teal-dark);
      border-radius: 8px;
      padding: 1rem 1.2rem;
    }
    .box-coral {
      background: rgba(249,113,89,0.1);
      border-left: 4px solid var(--coral);
      border-radius: 8px;
      padding: 1rem 1.2rem;
    }

    .eyebrow {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--coral);
    }

    h1, h2, h3, h4 {
      font-family: 'Caveat', cursive;
      font-weight: 600;
      color: var(--dark);
    }

    .option-btn {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.85rem;
      border: 1.5px solid #e0efee;
      background: var(--white);
      border-radius: 10px;
      padding: 1.2rem 1rem;
      width: 100%;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      color: var(--dark);
      line-height: 1.4;
    }
    .option-btn:hover {
      border-color: var(--teal-dark);
      background: var(--teal);
      transform: translateY(-1px);
    }
    .option-btn.selected {
      border-color: var(--dark);
      background: var(--teal);
      font-weight: 700;
    }

    .progress-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ddd;
      transition: background 0.2s, transform 0.2s;
    }
    .dot.active {
      background: var(--coral);
      transform: scale(1.3);
    }
    .dot.done {
      background: var(--teal-dark);
    }

    .wc-divider {
      border: none;
      height: 2px;
      background: linear-gradient(90deg, var(--coral) 0%, var(--teal) 100%);
      border-radius: 2px;
      width: 60px;
      margin: 0.5rem auto 1.5rem;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">Watercolor ✦</a>
    <div class="navbar-nav ms-auto d-flex flex-row gap-1">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/learn/1">Learn</a>
      <a class="nav-link" href="/quiz">Quiz</a>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
