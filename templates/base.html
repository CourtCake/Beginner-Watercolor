<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beginner Watercolor for Hobbyists</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap');

    body {
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      background: #f9f5f0;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      background: rgba(178, 210, 205, 0.55) !important;
      backdrop-filter: blur(4px);
    }
    .navbar-brand, .nav-link {
      font-family: 'Caveat', cursive;
      font-size: 1.3rem;
      color: #4a4a4a !important;
    }

    /* ── Hero banner ── */
    .hero-banner {
      background: linear-gradient(135deg,
        rgba(255,200,120,0.55) 0%,
        rgba(178,210,205,0.6) 40%,
        rgba(180,200,235,0.55) 100%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 2px, transparent 2px, transparent 20px);
      padding: 3rem 2rem;
      text-align: center;
    }
    .hero-banner h1 {
      font-size: 2.8rem;
      color: #3a3a3a;
    }

    /* ── Cards & buttons ── */
    .wc-card {
      border: 2px solid #9ecfca;
      border-radius: 12px;
      background: rgba(255,255,255,0.7);
    }
    .btn-wc {
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      border: 2px solid #9ecfca;
      background: rgba(255,255,255,0.7);
      color: #3a3a3a;
      border-radius: 8px;
      padding: 0.5rem 1.6rem;
      transition: background 0.2s;
    }
    .btn-wc:hover { background: #d4eeeb; }

    /* ── Info boxes ── */
    .box-green {
      background: rgba(178,210,185,0.45);
      border-radius: 10px;
      padding: 1rem 1.2rem;
    }
    .box-orange {
      background: rgba(240,185,145,0.45);
      border-radius: 10px;
      padding: 1rem 1.2rem;
    }

    /* ── Quiz option buttons ── */
    .option-btn {
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      border: 2px solid #9ecfca;
      background: rgba(255,255,255,0.65);
      border-radius: 14px;
      padding: 0.8rem 1rem;
      width: 100%;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .option-btn:hover { background: #d4eeeb; }
    .option-btn.selected { border-color: #3a3a3a; background: #e8f5f3; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">Home</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/learn/1">Learn</a>
      <a class="nav-link" href="/quiz">Quiz</a>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
